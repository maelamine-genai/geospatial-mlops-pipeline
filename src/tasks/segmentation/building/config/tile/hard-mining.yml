engine:
  pan_dirname: PAN
  gt_dirname: GT-Masks
  preds_dirname: Outputs/masks
  context_dirname: Context
  target_size_m: 100
  overlap: 0.5
  skip_tiles_with_nodata: true

adapter:
  class_of_interest_id: 1
  emit_shadow: true
  shadow_id: 2
  min_change_pixels: 1

policy:
  kind: hard_mining

  # Threshold on adapter.difficulty().value (for water this is change_ratio,
  # but gated to 0.0 when change_pixels < min_change_pixels)
  min_difficulty: 0.1  # tune

  # Always include GT-positive tiles (keeps recall signal)
  include_if_gt_present: true
  gt_presence_threshold: 0.01

  presence_prefix: "presence__"
  difficulty_prefix: "difficulty__"

meta:
  csv_name_default: building_tiles_hard_balanced_v0.csv
  schema_defaults:
    presence__value: 0.0
    difficulty__value: 0.0
