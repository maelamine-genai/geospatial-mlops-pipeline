version: 1

stage:
  splits: { train: 0.5, val: 0.5 }
  seed: 1337

grouping:
  group_col: region

stratification:
  kind: binned_group_metric
  group_metric:
    mode: presence_frac
    source_col: building_ratio
    presence_eps: 0.001
  bins: [0.0, 0.05, 0.2, 0.6, 1.0]

outputs:
  group_list_prefix: regions
